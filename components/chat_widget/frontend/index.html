<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Demografy chat widget</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Open+Sauce+One:wght@400;500;600;700;800&display=swap");

        html, body {
            margin: 0;
            padding: 0;
            background: transparent;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Open Sauce One", "Inter", "Segoe UI", sans-serif;
        }

        @keyframes cwIn {
            0% { opacity: 0; transform: translateY(14px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes cwDot {
            0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-2px); }
        }

        .chat-fab {
            position: fixed;
            right: 24px;
            bottom: 22px;
            width: 60px;
            height: 60px;
            border-radius: 999px;
            background: linear-gradient(135deg, #9a66ee, #5e17eb);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.45rem;
            cursor: pointer;
            box-shadow: 0 14px 30px rgba(94, 23, 235, 0.34), 0 4px 12px rgba(94, 23, 235, 0.24);
            z-index: 2200;
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
            user-select: none;
        }
        .chat-fab.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.92);
        }
        .chat-fab:hover {
            transform: translateY(-1px) scale(1.03);
            box-shadow: 0 18px 34px rgba(94, 23, 235, 0.4), 0 6px 16px rgba(94, 23, 235, 0.28);
        }

        .chat-widget {
            display: none;
            position: fixed;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            background: #fff;
            border: 1px solid #dccbff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 24px 48px rgba(94, 23, 235, 0.2), 0 6px 14px rgba(94, 23, 235, 0.12);
            z-index: 2195;
        }
        .chat-widget.open {
            display: flex;
            flex-direction: column;
            animation: cwIn 0.2s ease-out;
        }
        .chat-widget.split {
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            border-radius: 0;
            border-right: none;
            box-shadow: -12px 0 32px rgba(94, 23, 235, 0.14);
        }

        .cw-header {
            height: 56px;
            padding: 0 14px;
            background: linear-gradient(135deg, #9a66ee 0%, #5e17eb 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .cw-actions { display: inline-flex; gap: 6px; align-items: center; }
        .cw-title { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1rem; }
        .cw-avatar {
            width: 26px; height: 26px; border-radius: 50%;
            background: rgba(255,255,255,0.22);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 0.92rem;
        }
        .cw-close, .cw-expand {
            border: none; background: transparent; color: #fff; font-size: 1rem; cursor: pointer;
            width: 28px; height: 28px; border-radius: 8px;
        }
        .cw-close:hover, .cw-expand:hover { background: rgba(255,255,255,0.15); }

        .cw-body {
            padding: 14px 14px 8px;
            flex: 1;
            overflow: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .cw-bubble {
            background: #f3eeff;
            color: #5e17eb;
            border-radius: 10px;
            padding: 9px 11px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .cw-thread {
            display: none;
            flex-direction: column;
            gap: 8px;
        }
        .cw-thread.active { display: flex; }
        .cw-msg {
            padding: 9px 11px;
            border-radius: 12px;
            font-size: 0.92rem;
            line-height: 1.45;
            max-width: 88%;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .cw-msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #9a66ee, #5e17eb);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .cw-msg.assistant {
            align-self: flex-start;
            background: #f3eeff;
            color: #272d2d;
            border-bottom-left-radius: 4px;
        }
        .cw-msg.thinking {
            align-self: flex-start;
            background: #ede2ff;
            color: #5e17eb;
            font-style: italic;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .cw-msg.thinking .cw-dot {
            width: 6px; height: 6px; border-radius: 50%; background: currentColor;
            animation: cwDot 1.1s infinite ease-in-out;
        }
        .cw-msg.thinking .cw-dot:nth-child(2) { animation-delay: 0.15s; }
        .cw-msg.thinking .cw-dot:nth-child(3) { animation-delay: 0.3s; }

        .cw-input-wrap {
            border-top: 1px solid #eadfff;
            padding: 10px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            background: #fdfbff;
            flex-shrink: 0;
        }
        .cw-input {
            flex: 1;
            border: 1px solid #e3d2ff;
            background: #ffffff;
            border-radius: 8px;
            height: 38px;
            padding: 0 10px;
            font-size: 0.9rem;
            outline: none;
            font-family: inherit;
        }
        .cw-input:focus { border-color: #9a66ee; }
        .cw-input:disabled {
            background: #f5f1ff;
            color: #9087a8;
            cursor: not-allowed;
        }
        .cw-send {
            border: none;
            background: transparent;
            color: #a7b1bf;
            font-size: 1rem;
            cursor: pointer;
            width: 30px;
            height: 30px;
            border-radius: 8px;
        }
        .cw-send:hover { background: #f3f5f8; color: #5e17eb; }
        .cw-send:disabled { opacity: 0.4; cursor: not-allowed; }
        .cw-limit-note {
            display: none;
            padding: 8px 12px;
            background: #fff5f5;
            color: #b91c1c;
            font-size: 0.78rem;
            font-weight: 600;
            text-align: center;
            border-top: 1px solid #fecaca;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div id="chat-fab" class="chat-fab" title="Open chat">&#128172;</div>

<div id="chat-widget" class="chat-widget">
    <div class="cw-header">
        <div class="cw-title"><span class="cw-avatar">&#129302;</span>HubBot</div>
        <div class="cw-actions">
            <button id="cw-expand" class="cw-expand" type="button" aria-label="Expand chat">&#10530;</button>
            <button id="cw-close" class="cw-close" type="button" aria-label="Close chat">&#10005;</button>
        </div>
    </div>
    <div class="cw-body">
        <div id="cw-welcome" class="cw-bubble">Hi! I'm HubBot. Ask me anything about Australian suburb data and I'll dig into the numbers for you.</div>
        <div id="cw-thread" class="cw-thread"></div>
    </div>
    <div id="cw-input-wrap" class="cw-input-wrap">
        <input id="cw-input" class="cw-input" placeholder="Ask about Australian suburb data..." autocomplete="off" />
        <button id="cw-send" class="cw-send" type="button" aria-label="Send">&#10137;</button>
    </div>
    <div id="cw-limit-note" class="cw-limit-note">You&#8217;ve reached your question limit for this session.</div>
</div>

<script>
(function () {
    "use strict";

    /*
     * Streamlit message protocol (legacy, no external lib).
     *  - We post {isStreamlitMessage:true, type, ...} to window.parent.
     *  - We listen for {type:"streamlit:render", args, ...} on our own window.
     */
    var READY = "streamlit:componentReady";
    var SET_VALUE = "streamlit:setComponentValue";
    var SET_HEIGHT = "streamlit:setFrameHeight";

    function send(type, payload) {
        window.parent.postMessage(
            Object.assign({ isStreamlitMessage: true, type: type }, payload || {}),
            "*"
        );
    }

    var fab = document.getElementById("chat-fab");
    var widget = document.getElementById("chat-widget");
    var closeBtn = document.getElementById("cw-close");
    var expandBtn = document.getElementById("cw-expand");
    var sendBtn = document.getElementById("cw-send");
    var input = document.getElementById("cw-input");
    var cwBody = widget.querySelector(".cw-body");
    var welcome = document.getElementById("cw-welcome");
    var thread = document.getElementById("cw-thread");
    var inputWrap = document.getElementById("cw-input-wrap");
    var limitNote = document.getElementById("cw-limit-note");

    var isOpen = false;
    var isSplit = false;
    var renderedMsgCount = 0; // count of non-thinking message nodes in thread

    // ---- Frame size signaling ------------------------------------------------
    // Tell the parent body which mode we're in. The parent CSS resizes our
    // own iframe element accordingly (small for FAB-only, larger for the
    // panel, full-half-screen for split).

    function broadcastMode() {
        var mode = isOpen ? (isSplit ? "split" : "open") : "fab";
        var msg = {
            demografy_chat_mode: mode,
            isOpen: isOpen,
            isSplit: isSplit,
            ts: Date.now()
        };
        try {
            var frames = window.parent.frames;
            for (var i = 0; i < frames.length; i++) {
                try { frames[i].postMessage(msg, "*"); } catch (_e) {}
            }
        } catch (_err) {}
        try { window.parent.postMessage(msg, "*"); } catch (_err2) {}
    }

    // ---- Open / close / expand ----------------------------------------------

    function openWidget() {
        if (isOpen) return;
        isOpen = true;
        widget.classList.add("open");
        fab.classList.add("hidden");
        broadcastMode();
        if (input && !input.disabled) {
            setTimeout(function () { input.focus(); }, 60);
        }
    }
    function closeWidget() {
        if (!isOpen) return;
        isOpen = false;
        isSplit = false;
        widget.classList.remove("open");
        widget.classList.remove("split");
        fab.classList.remove("hidden");
        broadcastMode();
    }
    function toggleSplit() {
        if (!isOpen) return;
        isSplit = !isSplit;
        widget.classList.toggle("split", isSplit);
        broadcastMode();
    }

    fab.addEventListener("click", function () {
        if (isOpen) closeWidget();
        else openWidget();
    });
    closeBtn.addEventListener("click", closeWidget);
    expandBtn.addEventListener("click", toggleSplit);

    // ---- DOM helpers --------------------------------------------------------

    function makeMsgNode(role, content) {
        var div = document.createElement("div");
        div.className = "cw-msg " + (role === "user" ? "user" : "assistant");
        div.textContent = String(content == null ? "" : content);
        return div;
    }
    function makeThinkingNode() {
        var div = document.createElement("div");
        div.className = "cw-msg thinking";
        div.id = "cw-thinking";
        div.innerHTML =
            '<span class="cw-dot"></span>' +
            '<span class="cw-dot"></span>' +
            '<span class="cw-dot"></span>' +
            "Thinking...";
        return div;
    }
    function showThread() {
        welcome.style.display = "none";
        thread.classList.add("active");
    }
    function showWelcome() {
        welcome.style.display = "";
        thread.classList.remove("active");
        thread.innerHTML = "";
        renderedMsgCount = 0;
    }
    function scrollBottom() {
        if (cwBody) cwBody.scrollTop = cwBody.scrollHeight;
    }

    // ---- Optimistic send ----------------------------------------------------

    function sendQuestion() {
        if (!input || input.disabled) return;
        var value = (input.value || "").trim();
        if (!value) return;
        input.value = "";
        var ts = Date.now();

        // Optimistic: show user bubble + Thinking immediately, regardless of
        // when Python's rerun lands. The reconcile() pass will leave these
        // alone (counts will line up when args arrive).
        showThread();
        thread.appendChild(makeMsgNode("user", value));
        renderedMsgCount += 1;
        if (!document.getElementById("cw-thinking")) {
            thread.appendChild(makeThinkingNode());
        }
        input.disabled = true;
        sendBtn.disabled = true;
        input.placeholder = "Thinking...";
        scrollBottom();

        send(SET_VALUE, {
            value: { question: value, ts: ts },
            dataType: "json"
        });
    }

    sendBtn.addEventListener("click", sendQuestion);
    input.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendQuestion();
        }
    });

    // ---- Reconcile DOM with Python args -------------------------------------

    function reconcile(args) {
        var items = (args && Array.isArray(args.messages)) ? args.messages : [];
        var pending = !!(args && args.pending);
        var limitReached = !!(args && args.limit_reached);

        // Input area vs limit note.
        if (limitReached) {
            inputWrap.style.display = "none";
            limitNote.style.display = "";
        } else {
            inputWrap.style.display = "";
            limitNote.style.display = "none";
            input.disabled = pending;
            sendBtn.disabled = pending;
            input.placeholder = pending
                ? "Thinking..."
                : "Ask about Australian suburb data...";
        }

        // Empty state -> welcome.
        if (items.length === 0 && !pending) {
            showWelcome();
            return;
        }
        showThread();

        // Append any new tail messages. We trust ordering: the Python history
        // never reorders, so item[i] for i < renderedMsgCount is already in
        // the DOM (possibly as an optimistic bubble, which has the same
        // textContent and role anyway).
        if (items.length > renderedMsgCount) {
            for (var i = renderedMsgCount; i < items.length; i++) {
                var m = items[i] || {};
                thread.appendChild(makeMsgNode(m.role, m.content));
            }
            renderedMsgCount = items.length;
        } else if (items.length < renderedMsgCount) {
            // History truncated externally. Rebuild from scratch.
            thread.innerHTML = "";
            items.forEach(function (m) {
                thread.appendChild(makeMsgNode(m.role, m.content));
            });
            renderedMsgCount = items.length;
        }

        // Toggle Thinking bubble.
        var thinking = document.getElementById("cw-thinking");
        if (pending && !thinking) {
            thread.appendChild(makeThinkingNode());
        } else if (!pending && thinking) {
            thinking.remove();
        } else if (pending && thinking) {
            // Keep Thinking after newly appended messages.
            thread.appendChild(thinking);
        }

        scrollBottom();
    }

    window.addEventListener("message", function (event) {
        var data = event && event.data;
        if (!data) return;
        if (data.type === "streamlit:render") {
            reconcile(data.args || {});
        }
    });

    // ---- Boot ---------------------------------------------------------------

    send(READY, { apiVersion: 1 });
    // The parent stylesheet sizes our iframe via CSS. Keep the legacy
    // setFrameHeight handshake happy with a placeholder height; the visible
    // size is overridden by the parent's CSS class.
    send(SET_HEIGHT, { height: 96 });
    broadcastMode();
})();
</script>

</body>
</html>
