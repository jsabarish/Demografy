<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Demografy chat widget</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Open+Sauce+One:wght@400;500;600;700;800&display=swap");

        html, body {
            margin: 0;
            padding: 0;
            background: transparent;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Open Sauce One", "Inter", "Segoe UI", sans-serif;
        }

        @keyframes cwIn {
            0% { opacity: 0; transform: translateY(14px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes cwDot {
            0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-2px); }
        }

        .chat-fab {
            position: fixed;
            right: 24px;
            bottom: 22px;
            width: 60px;
            height: 60px;
            border-radius: 999px;
            background: linear-gradient(135deg, #9a66ee, #5e17eb);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.45rem;
            cursor: pointer;
            box-shadow: 0 14px 30px rgba(94, 23, 235, 0.34), 0 4px 12px rgba(94, 23, 235, 0.24);
            z-index: 2200;
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
            user-select: none;
        }
        .chat-fab.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.92);
        }
        .chat-fab:hover {
            transform: translateY(-1px) scale(1.03);
            box-shadow: 0 18px 34px rgba(94, 23, 235, 0.4), 0 6px 16px rgba(94, 23, 235, 0.28);
        }

        .chat-widget {
            display: none;
            position: fixed;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            background: #fff;
            border: 1px solid #dccbff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 24px 48px rgba(94, 23, 235, 0.2), 0 6px 14px rgba(94, 23, 235, 0.12);
            z-index: 2195;
        }
        .chat-widget.open {
            display: flex;
            flex-direction: column;
            animation: cwIn 0.2s ease-out;
        }
        .chat-widget.split {
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            border-radius: 0;
            border-right: none;
            box-shadow: -12px 0 32px rgba(94, 23, 235, 0.14);
        }

        .cw-header {
            height: 56px;
            padding: 0 14px;
            background: linear-gradient(135deg, #9a66ee 0%, #5e17eb 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .cw-actions { display: inline-flex; gap: 6px; align-items: center; }
        .cw-title { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1rem; }
        .cw-avatar {
            width: 26px; height: 26px; border-radius: 50%;
            background: rgba(255,255,255,0.22);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 0.92rem;
        }
        .cw-close, .cw-expand, .cw-new, .cw-history {
            border: none; background: transparent; color: #fff; font-size: 1rem; cursor: pointer;
            width: 28px; height: 28px; border-radius: 8px;
            display: inline-flex; align-items: center; justify-content: center;
            line-height: 1;
        }
        .cw-close:hover, .cw-expand:hover, .cw-new:hover, .cw-history:hover { background: rgba(255,255,255,0.15); }
        .cw-new { font-size: 1.25rem; font-weight: 700; }
        .cw-history svg { width: 16px; height: 16px; display: block; }

        .cw-body {
            padding: 14px 14px 8px;
            flex: 1;
            overflow: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .cw-bubble {
            background: #f3eeff;
            color: #5e17eb;
            border-radius: 10px;
            padding: 9px 11px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .cw-thread {
            display: none;
            flex-direction: column;
            gap: 8px;
        }
        .cw-thread.active { display: flex; }
        .cw-msg {
            padding: 9px 11px;
            border-radius: 12px;
            font-size: 0.92rem;
            line-height: 1.45;
            max-width: 88%;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .cw-msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #9a66ee, #5e17eb);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .cw-msg.assistant {
            align-self: flex-start;
            background: #f3eeff;
            color: #272d2d;
            border-bottom-left-radius: 4px;
        }
        .cw-msg img {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            margin-top: 6px;
        }
        .cw-msg .cw-msg-text {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .cw-msg.thinking {
            align-self: flex-start;
            background: #ede2ff;
            color: #5e17eb;
            font-style: italic;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .cw-msg.thinking .cw-dot {
            width: 6px; height: 6px; border-radius: 50%; background: currentColor;
            animation: cwDot 1.1s infinite ease-in-out;
        }
        .cw-msg.thinking .cw-dot:nth-child(2) { animation-delay: 0.15s; }
        .cw-msg.thinking .cw-dot:nth-child(3) { animation-delay: 0.3s; }

        .cw-input-wrap {
            border-top: 1px solid #eadfff;
            padding: 10px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            background: #fdfbff;
            flex-shrink: 0;
        }
        .cw-input {
            flex: 1;
            border: 1px solid #e3d2ff;
            background: #ffffff;
            border-radius: 8px;
            height: 38px;
            padding: 0 10px;
            font-size: 0.9rem;
            outline: none;
            font-family: inherit;
        }
        .cw-input:focus { border-color: #9a66ee; }
        .cw-input:disabled {
            background: #f5f1ff;
            color: #9087a8;
            cursor: not-allowed;
        }
        .cw-send {
            border: none;
            background: transparent;
            color: #a7b1bf;
            font-size: 1rem;
            cursor: pointer;
            width: 30px;
            height: 30px;
            border-radius: 8px;
        }
        .cw-send:hover { background: #f3f5f8; color: #5e17eb; }
        .cw-send:disabled { opacity: 0.4; cursor: not-allowed; }
        .cw-limit-note {
            display: none;
            padding: 8px 12px;
            background: #fff5f5;
            color: #b91c1c;
            font-size: 0.78rem;
            font-weight: 600;
            text-align: center;
            border-top: 1px solid #fecaca;
            flex-shrink: 0;
        }
        .cw-limit-note .cw-cooldown-secs {
            font-variant-numeric: tabular-nums;
        }

        /* ---- Suggested follow-up chips ---------------------------------- */
        .cw-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 4px 0 2px;
            align-self: flex-start;
            max-width: 92%;
        }
        .cw-chip {
            border: 1px solid #d7c4ff;
            background: #f6efff;
            color: #5e17eb;
            border-radius: 999px;
            padding: 6px 12px;
            font: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            line-height: 1.2;
            transition: background 0.12s ease, transform 0.08s ease;
        }
        .cw-chip:hover { background: #ede0ff; }
        .cw-chip:active { transform: translateY(1px); }
        .cw-chip[disabled] { opacity: 0.55; cursor: default; }

        /* ---- Past chats overlay ----------------------------------------- */
        .cw-history-panel {
            position: absolute;
            inset: 56px 0 0 0; /* sit below the header */
            background: #ffffff;
            display: flex;
            flex-direction: column;
            z-index: 5;
        }
        .cw-history-panel[hidden] { display: none; }
        .cw-history-header {
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 700;
            font-size: 0.92rem;
            color: #5e17eb;
            border-bottom: 1px solid #efe6ff;
            background: #fbf8ff;
        }
        .cw-history-back {
            border: none;
            background: transparent;
            color: #5e17eb;
            cursor: pointer;
            font-size: 1rem;
            width: 28px;
            height: 28px;
            border-radius: 8px;
        }
        .cw-history-back:hover { background: #efe6ff; }
        .cw-history-list {
            list-style: none;
            margin: 0;
            padding: 6px 8px;
            overflow: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .cw-history-item {
            border: 1px solid transparent;
            background: #f9f5ff;
            color: #272d2d;
            border-radius: 10px;
            padding: 10px 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
            text-align: left;
            font-family: inherit;
            font-size: 0.88rem;
            transition: background 0.12s ease, border-color 0.12s ease;
        }
        .cw-history-item:hover {
            background: #efe6ff;
            border-color: #d7c4ff;
        }
        .cw-history-item[aria-current="true"] {
            background: #efe6ff;
            border-color: #9a66ee;
        }
        .cw-history-title {
            font-weight: 600;
            color: #272d2d;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cw-history-meta {
            font-size: 0.74rem;
            color: #6b7280;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .cw-history-chip {
            background: rgba(94, 23, 235, 0.1);
            color: #5e17eb;
            border-radius: 999px;
            padding: 1px 8px;
            font-weight: 600;
        }
        .cw-history-empty {
            padding: 24px 16px;
            text-align: center;
            color: #6b7280;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div id="chat-fab" class="chat-fab" title="Open chat">&#128172;</div>

<div id="chat-widget" class="chat-widget">
    <div class="cw-header">
        <div class="cw-title"><span class="cw-avatar">&#129302;</span>Demograpfy AI Agent</div>
        <div class="cw-actions">
            <button id="cw-new" class="cw-new" type="button" aria-label="Start new chat" title="New chat">+</button>
            <button id="cw-history" class="cw-history" type="button" aria-label="View past chats" title="Past chats">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="9"></circle>
                    <polyline points="12 7 12 12 15 14"></polyline>
                </svg>
            </button>
            <button id="cw-expand" class="cw-expand" type="button" aria-label="Expand chat">&#10530;</button>
            <button id="cw-close" class="cw-close" type="button" aria-label="Close chat">&#10005;</button>
        </div>
    </div>
    <div class="cw-body">
        <div id="cw-welcome" class="cw-bubble">Hi! I'm Demograpfy AI Agent. Ask me anything about Australian suburb data and I'll dig into the numbers for you.</div>
        <div id="cw-thread" class="cw-thread"></div>
    </div>
    <div id="cw-input-wrap" class="cw-input-wrap">
        <input id="cw-input" class="cw-input" placeholder="Ask about Australian suburb data..." autocomplete="off" />
        <button id="cw-send" class="cw-send" type="button" aria-label="Send">&#10137;</button>
    </div>
    <div id="cw-limit-note" class="cw-limit-note">
        <span id="cw-limit-text">You&#8217;ve reached your question limit for this session.</span>
    </div>

    <div id="cw-history-panel" class="cw-history-panel" hidden>
        <div class="cw-history-header">
            <span>Past chats</span>
            <button id="cw-history-back" class="cw-history-back" type="button" aria-label="Back to chat">&#10005;</button>
        </div>
        <ul id="cw-history-list" class="cw-history-list"></ul>
        <div id="cw-history-empty" class="cw-history-empty" hidden>No past chats yet. Start one by asking a question.</div>
    </div>
</div>

<script>
(function () {
    "use strict";

    /*
     * Streamlit message protocol (legacy, no external lib).
     *  - We post {isStreamlitMessage:true, type, ...} to window.parent.
     *  - We listen for {type:"streamlit:render", args, ...} on our own window.
     */
    var READY = "streamlit:componentReady";
    var SET_VALUE = "streamlit:setComponentValue";
    var SET_HEIGHT = "streamlit:setFrameHeight";

    function send(type, payload) {
        window.parent.postMessage(
            Object.assign({ isStreamlitMessage: true, type: type }, payload || {}),
            "*"
        );
    }

    var fab = document.getElementById("chat-fab");
    var widget = document.getElementById("chat-widget");
    var closeBtn = document.getElementById("cw-close");
    var expandBtn = document.getElementById("cw-expand");
    var newBtn = document.getElementById("cw-new");
    var historyBtn = document.getElementById("cw-history");
    var historyBackBtn = document.getElementById("cw-history-back");
    var historyPanel = document.getElementById("cw-history-panel");
    var historyList = document.getElementById("cw-history-list");
    var historyEmpty = document.getElementById("cw-history-empty");
    var sendBtn = document.getElementById("cw-send");
    var input = document.getElementById("cw-input");
    var cwBody = widget.querySelector(".cw-body");
    var welcome = document.getElementById("cw-welcome");
    var thread = document.getElementById("cw-thread");
    var inputWrap = document.getElementById("cw-input-wrap");
    var limitNote = document.getElementById("cw-limit-note");
    var limitText = document.getElementById("cw-limit-text");

    var isOpen = false;
    var isSplit = false;
    var renderedMsgCount = 0; // count of non-thinking message nodes in thread
    var lastThreadsKey = "";  // signature of the threads array we last rendered
    var lastActiveThreadId = ""; // id of the thread we last reconciled to
    var historyVisible = false;
    var resetOnNextOpen = false;

    // ---- Cooldown ticker ----------------------------------------------------
    // Drives the live "You can ask again in Xs" label without waiting for
    // Streamlit to rerun. The Python side is the source of truth: when the
    // user submits after the timer ends, the engine resets question_count
    // and clears the cooldown, so a stale clock here is harmless.

    var cooldownTickerId = null;
    var cooldownUntilMs = 0;
    var cooldownActive = false;

    function _formatLimitMessage(remainingSeconds) {
        if (remainingSeconds > 0) {
            return (
                "You have reached the limit for this session. " +
                "You can ask again in " +
                '<span class="cw-cooldown-secs">' + remainingSeconds + "s</span>."
            );
        }
        return "Cooldown finished - you can ask again now.";
    }

    function _renderCooldownLabel() {
        if (!limitText) return;
        var remainingMs = Math.max(0, cooldownUntilMs - Date.now());
        var remaining = Math.ceil(remainingMs / 1000);
        limitText.innerHTML = _formatLimitMessage(remaining);
        if (remainingMs <= 0) {
            stopCooldownTicker();
            // Re-enable the input optimistically. The next submit triggers
            // server-side cooldown expiry and quota reset.
            if (input) input.disabled = false;
            if (sendBtn) sendBtn.disabled = false;
            if (input) input.placeholder = "Ask about Australian suburb data...";
        }
    }

    function startCooldownTicker(untilMs) {
        cooldownUntilMs = Number(untilMs) || 0;
        cooldownActive = true;
        _renderCooldownLabel();
        if (cooldownTickerId !== null) return;
        cooldownTickerId = setInterval(_renderCooldownLabel, 1000);
    }

    function stopCooldownTicker() {
        cooldownActive = false;
        if (cooldownTickerId !== null) {
            clearInterval(cooldownTickerId);
            cooldownTickerId = null;
        }
    }

    // ---- Frame size signaling ------------------------------------------------
    // Tell the parent body which mode we're in. The parent CSS resizes our
    // own iframe element accordingly (small for FAB-only, larger for the
    // panel, full-half-screen for split).

    function broadcastMode() {
        var mode = isOpen ? (isSplit ? "split" : "open") : "fab";
        var msg = {
            demografy_chat_mode: mode,
            isOpen: isOpen,
            isSplit: isSplit,
            ts: Date.now()
        };
        try {
            var frames = window.parent.frames;
            for (var i = 0; i < frames.length; i++) {
                try { frames[i].postMessage(msg, "*"); } catch (_e) {}
            }
        } catch (_err) {}
        try { window.parent.postMessage(msg, "*"); } catch (_err2) {}
    }

    // ---- Open / close / expand ----------------------------------------------

    function openWidget() {
        if (isOpen) return;
        isOpen = true;
        widget.classList.add("open");
        fab.classList.add("hidden");
        broadcastMode();
        if (input && !input.disabled) {
            setTimeout(function () { input.focus(); }, 60);
        }
    }
    function closeWidget() {
        if (!isOpen) return;
        isOpen = false;
        isSplit = false;
        widget.classList.remove("open");
        widget.classList.remove("split");
        fab.classList.remove("hidden");
        if (historyVisible) hideHistoryPanel();
        broadcastMode();
    }
    function toggleSplit() {
        if (!isOpen) return;
        isSplit = !isSplit;
        widget.classList.toggle("split", isSplit);
        broadcastMode();
    }

    fab.addEventListener("click", function () {
        if (isOpen) {
            closeWidget();
            return;
        }
        if (resetOnNextOpen) {
            resetOnNextOpen = false;
            thread.innerHTML = "";
            renderedMsgCount = 0;
            showWelcome();
            hideHistoryPanel();
            if (input) {
                input.disabled = false;
                input.value = "";
                input.placeholder = "Ask about Australian suburb data...";
            }
            if (sendBtn) sendBtn.disabled = false;
            send(SET_VALUE, {
                value: { action: "new_chat", ts: Date.now() },
                dataType: "json"
            });
        }
        openWidget();
    });
    closeBtn.addEventListener("click", function () {
        resetOnNextOpen = true;
        closeWidget();
    });
    expandBtn.addEventListener("click", toggleSplit);

    // ---- New chat / past-chats overlay --------------------------------------

    function showHistoryPanel() {
        historyVisible = true;
        historyPanel.hidden = false;
    }
    function hideHistoryPanel() {
        historyVisible = false;
        historyPanel.hidden = true;
    }
    function toggleHistoryPanel() {
        if (historyVisible) hideHistoryPanel();
        else showHistoryPanel();
    }

    function startNewChat() {
        // Optimistic local reset so the UI feels instant; Python will
        // confirm on the next render with empty messages.
        thread.innerHTML = "";
        renderedMsgCount = 0;
        showWelcome();
        hideHistoryPanel();
        // showWelcome() already wipes the thread (including chips) but be
        // explicit so future refactors of showWelcome don't regress this.
        // No-op when chips weren't present.
        if (input) {
            input.disabled = false;
            input.value = "";
            input.placeholder = "Ask about Australian suburb data...";
        }
        if (sendBtn) sendBtn.disabled = false;

        send(SET_VALUE, {
            value: { action: "new_chat", ts: Date.now() },
            dataType: "json"
        });
        if (input && !input.disabled) {
            setTimeout(function () { input.focus(); }, 60);
        }
    }

    function pickThread(threadId) {
        if (!threadId) return;
        // Reset locally so the thread we're switching to renders cleanly
        // when Python's next push arrives with the new messages.
        thread.innerHTML = "";
        renderedMsgCount = 0;
        showWelcome();
        hideHistoryPanel();

        send(SET_VALUE, {
            value: { action: "open_thread", thread_id: threadId, ts: Date.now() },
            dataType: "json"
        });
    }

    newBtn.addEventListener("click", startNewChat);
    historyBtn.addEventListener("click", toggleHistoryPanel);
    historyBackBtn.addEventListener("click", hideHistoryPanel);

    // ---- DOM helpers --------------------------------------------------------

    function makeMsgNode(role, content, imageB64) {
        var div = document.createElement("div");
        div.className = "cw-msg " + (role === "user" ? "user" : "assistant");
        var text = String(content == null ? "" : content).trim();
        if (imageB64) {
            var img = document.createElement("img");
            img.alt = "Chart";
            img.src = "data:image/png;base64," + String(imageB64);
            div.appendChild(img);
        }
        if (text) {
            var span = document.createElement("div");
            span.className = "cw-msg-text";
            span.textContent = text;
            div.appendChild(span);
        }
        if (!imageB64 && !text) {
            div.textContent = "";
        }
        return div;
    }
    function makeThinkingNode() {
        var div = document.createElement("div");
        div.className = "cw-msg thinking";
        div.id = "cw-thinking";
        div.innerHTML =
            '<span class="cw-dot"></span>' +
            '<span class="cw-dot"></span>' +
            '<span class="cw-dot"></span>' +
            "Thinking...";
        return div;
    }
    function showThread() {
        welcome.style.display = "none";
        thread.classList.add("active");
    }
    function showWelcome() {
        welcome.style.display = "";
        thread.classList.remove("active");
        thread.innerHTML = "";
        renderedMsgCount = 0;
    }
    function scrollBottom() {
        if (cwBody) cwBody.scrollTop = cwBody.scrollHeight;
    }

    // ---- Past-chats list ----------------------------------------------------

    function relativeTime(iso) {
        if (!iso) return "";
        var ts = Date.parse(iso);
        if (isNaN(ts)) return "";
        var diff = Math.max(0, (Date.now() - ts) / 1000);
        if (diff < 60) return "just now";
        if (diff < 3600) return Math.floor(diff / 60) + "m ago";
        if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
        if (diff < 86400 * 7) return Math.floor(diff / 86400) + "d ago";
        try { return new Date(ts).toLocaleDateString(); }
        catch (_e) { return ""; }
    }

    function renderThreadList(threads, activeId) {
        threads = Array.isArray(threads) ? threads : [];
        // Cheap signature so we don't tear down + rebuild every Streamlit
        // render when nothing has changed.
        var key = (activeId || "") + "|" + threads.map(function (t) {
            return [t.thread_id, t.updated_at, t.message_count].join(":");
        }).join(",");
        if (key === lastThreadsKey) return;
        lastThreadsKey = key;

        historyList.innerHTML = "";
        if (threads.length === 0) {
            historyEmpty.hidden = false;
            return;
        }
        historyEmpty.hidden = true;

        threads.forEach(function (t) {
            var li = document.createElement("li");
            var btn = document.createElement("button");
            btn.type = "button";
            btn.className = "cw-history-item";
            if (t.thread_id === activeId) {
                btn.setAttribute("aria-current", "true");
            }
            btn.dataset.threadId = t.thread_id;

            var title = document.createElement("div");
            title.className = "cw-history-title";
            title.textContent = t.title || "New chat";

            var meta = document.createElement("div");
            meta.className = "cw-history-meta";
            var when = document.createElement("span");
            when.textContent = relativeTime(t.updated_at);
            var chip = document.createElement("span");
            chip.className = "cw-history-chip";
            var n = Number(t.message_count || 0);
            chip.textContent = n + (n === 1 ? " msg" : " msgs");
            meta.appendChild(when);
            meta.appendChild(chip);

            btn.appendChild(title);
            btn.appendChild(meta);
            btn.addEventListener("click", function () {
                pickThread(t.thread_id);
            });

            li.appendChild(btn);
            historyList.appendChild(li);
        });
    }

    // ---- Optimistic send ----------------------------------------------------

    function sendQuestionText(value) {
        // Shared submit path for typed questions and chip clicks. The
        // chip handler bypasses the input element entirely, so we read
        // the value as an argument instead of from input.value.
        value = (value == null ? "" : String(value)).trim();
        if (!value) return;
        if (input && input.disabled) return;

        // Wipe any chips immediately - Python will replace them after the
        // next answer. Doing this locally avoids a stale chip flashing
        // briefly while the agent is thinking.
        var existing = thread.querySelector(".cw-suggestions");
        if (existing) existing.remove();

        // Optimistic: show user bubble + Thinking immediately, regardless of
        // when Python's rerun lands. The reconcile() pass will leave these
        // alone (counts will line up when args arrive).
        showThread();
        thread.appendChild(makeMsgNode("user", value, null));
        renderedMsgCount += 1;
        if (!document.getElementById("cw-thinking")) {
            thread.appendChild(makeThinkingNode());
        }
        if (input) {
            input.disabled = true;
            input.placeholder = "Thinking...";
        }
        if (sendBtn) sendBtn.disabled = true;
        scrollBottom();

        send(SET_VALUE, {
            value: { action: "question", question: value, ts: Date.now() },
            dataType: "json"
        });
    }

    function sendQuestion() {
        if (!input || input.disabled) return;
        var value = input.value || "";
        input.value = "";
        sendQuestionText(value);
    }

    sendBtn.addEventListener("click", sendQuestion);
    input.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendQuestion();
        }
    });

    // ---- Suggested follow-up chips ------------------------------------------

    function clearSuggestions() {
        var existing = thread.querySelector(".cw-suggestions");
        if (existing) existing.remove();
    }

    function renderSuggestions(list, pending, limitReached) {
        clearSuggestions();
        if (pending || limitReached) return;
        if (!Array.isArray(list) || list.length === 0) return;

        // Only show chips when the latest visible bubble is an assistant
        // reply. If the trailing node is a user bubble (e.g. mid-flight
        // optimistic state), suppress chips - they belong with the answer.
        var lastMsg = thread.querySelector(".cw-msg:last-of-type");
        if (!lastMsg || !lastMsg.classList.contains("assistant")) return;

        var box = document.createElement("div");
        box.className = "cw-suggestions";
        list.slice(0, 4).forEach(function (text) {
            var chip = document.createElement("button");
            chip.type = "button";
            chip.className = "cw-chip";
            var label = String(text);
            chip.textContent = label;
            chip.addEventListener("click", function () {
                if (input && input.disabled) return;
                if (label === "Show as a chart?") {
                    send(SET_VALUE, {
                        value: { action: "chart", ts: Date.now() },
                        dataType: "json"
                    });
                    return;
                }
                sendQuestionText(label);
            });
            box.appendChild(chip);
        });
        thread.appendChild(box);
        scrollBottom();
    }

    // ---- Reconcile DOM with Python args -------------------------------------

    function reconcile(args) {
        var items = (args && Array.isArray(args.messages)) ? args.messages : [];
        var pending = !!(args && args.pending);
        var limitReached = !!(args && args.limit_reached);
        var threads = (args && Array.isArray(args.threads)) ? args.threads : [];
        var activeId = (args && args.active_thread_id) || "";
        var suggestions = (args && Array.isArray(args.suggestions)) ? args.suggestions : [];
        var serverCooldownUntilMs = Number((args && args.cooldown_until_ms) || 0);

        // If the active thread changed (new chat or switched thread), wipe
        // the DOM thread first so we never paint the old conversation
        // briefly while the new messages are being appended.
        if (activeId !== lastActiveThreadId) {
            thread.innerHTML = "";
            renderedMsgCount = 0;
            lastActiveThreadId = activeId;
        }

        // Past-chats list (kept fresh even when the overlay isn't visible
        // so opening it is instant).
        renderThreadList(threads, activeId);

        // Input area vs limit note. We deliberately keep the input row
        // visible so the user always sees where to type; the cooldown
        // banner sits below it with a live countdown.
        inputWrap.style.display = "";
        if (limitReached) {
            input.disabled = true;
            sendBtn.disabled = true;
            input.placeholder = "Limit reached - please wait...";
            limitNote.style.display = "";
            startCooldownTicker(serverCooldownUntilMs || Date.now());
        } else {
            stopCooldownTicker();
            limitNote.style.display = "none";
            input.disabled = pending;
            sendBtn.disabled = pending;
            input.placeholder = pending
                ? "Thinking..."
                : "Ask about Australian suburb data...";
        }

        // Empty state -> welcome.
        if (items.length === 0 && !pending) {
            showWelcome();
            return;
        }
        showThread();

        // Append any new tail messages. We trust ordering: the Python history
        // never reorders, so item[i] for i < renderedMsgCount is already in
        // the DOM (possibly as an optimistic bubble, which has the same
        // textContent and role anyway).
        if (items.length > renderedMsgCount) {
            for (var i = renderedMsgCount; i < items.length; i++) {
                var m = items[i] || {};
                thread.appendChild(makeMsgNode(m.role, m.content, m.image_b64));
            }
            renderedMsgCount = items.length;
        } else if (items.length < renderedMsgCount) {
            // History truncated externally (e.g. switched threads or
            // started a new chat). Rebuild from scratch.
            thread.innerHTML = "";
            items.forEach(function (m) {
                thread.appendChild(makeMsgNode(m.role, m.content, m.image_b64));
            });
            renderedMsgCount = items.length;
        }

        // Toggle Thinking bubble.
        var thinking = document.getElementById("cw-thinking");
        if (pending && !thinking) {
            thread.appendChild(makeThinkingNode());
        } else if (!pending && thinking) {
            thinking.remove();
        } else if (pending && thinking) {
            // Keep Thinking after newly appended messages.
            thread.appendChild(thinking);
        }

        // Suggested follow-up chips: rebuilt on every reconcile so they
        // always sit underneath the latest assistant bubble. Clearing
        // first avoids duplicates after thread switches or rebuilds.
        renderSuggestions(suggestions, pending, limitReached);

        scrollBottom();
    }

    window.addEventListener("message", function (event) {
        var data = event && event.data;
        if (!data) return;
        if (data.type === "streamlit:render") {
            reconcile(data.args || {});
        }
    });

    // ---- Boot ---------------------------------------------------------------

    send(READY, { apiVersion: 1 });
    // The parent stylesheet sizes our iframe via CSS. Keep the legacy
    // setFrameHeight handshake happy with a placeholder height; the visible
    // size is overridden by the parent's CSS class.
    send(SET_HEIGHT, { height: 96 });
    broadcastMode();
})();
</script>

</body>
</html>
